{% extends "auth_base.html" %}
{% block content %}
<div class="auth-shell">
    <div class="auth-card confirm-card">
        <div class="auth-brand">
            <span class="auth-brand-mark" aria-hidden="true">⛨</span>
            <span class="auth-brand-text">Phishing Email Detector</span>
        </div>
        <div class="confirm-state">
            <div class="confirm-mail-icon" aria-hidden="true">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
                    <path d="M3 6.5 12 13l9-6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.6" />
                </svg>
            </div>
            <h1 class="auth-title confirm-title">Check your inbox</h1>
            <p class="auth-subtitle">We sent a confirmation link to<br><strong>{{ email }}</strong>.<br>Click it to
                activate your account.</p>
        </div>
        <div class="auth-switch" style="margin-top: 22px;">
            <a href="{{ url_for('login') }}">Back to log in</a>
        </div>
    </div>
</div>
{% endblock %}
