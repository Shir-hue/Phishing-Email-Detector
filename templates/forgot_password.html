{% extends "auth_base.html" %}

{% block title %}Forgot password{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="auth-brand-mark" aria-hidden="true">⛨</span>
            <span class="auth-brand-text">Phishing Email Detector</span>
        </div>

        <div class="auth-header">
            <h1 class="auth-title">Reset your password</h1>
            <p class="auth-subtitle">We'll send a reset link to your email.</p>
        </div>

        <form class="form" action="{{ url_for('forgot_password') }}" method="post" aria-label="Forgot password form">
            <div class="auth-field">
                <label for="forgotEmail" class="auth-label">Email</label>
                <input id="forgotEmail" name="email" type="email" placeholder="you@example.com" required
                    autocomplete="email" />
            </div>

            <button type="submit" class="auth-submit">Send reset link</button>
        </form>

        <div class="auth-switch">
            <span>Remember your password?</span>
            <a href="{{ url_for('login') }}">Log in</a>
        </div>
    </div>
</div>
{% endblock %}
